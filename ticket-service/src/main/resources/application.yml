server:
  port: 8088

spring:
  application:
    name: ticket-service

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    connect-retries: 10

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      initialization-fail-timeout: 60000
      connection-timeout: 30000

springdoc:
  api-docs:
    enabled: true
    path: /api-docs

  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

  hateoas:
    enabled: false

  cache:
    disabled: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}

---

spring:
  config:
    activate:
      on-profile: local

  datasource:
    url: jdbc:mysql://localhost:3306/cine_tickets_db?createDatabaseIfNotExist=true&nullCatalogMeansCurrent=true
    username: root
    password: root

---

spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:mysql://cine-db:3306/cine_tickets_db
    username: root
    password: root