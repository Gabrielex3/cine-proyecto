spring.application.name=room-services
server.port=8086
spring.datasource.url=jdbc:mysql://cine-db:3306/cine_rooms_db?createDatabaseIfNotExist=true&nullCatalogMeansCurrent=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true


logging.level.root=INFO 

logging.level.cine.proyect.showtimeservice=DEBUG 

logging.level.org.hibernate.SQL=DEBUG


logging.file.name=mi-log-showtime.log

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
springdoc.api-docs.path=/api-docs