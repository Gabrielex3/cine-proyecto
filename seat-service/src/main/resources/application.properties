spring.application.name=seat-service
server.port=8083

spring.datasource.url=jdbc:mysql://localhost:3306/cine_seats_db?createDatabaseIfNotExist=true&nullCatalogMeansCurrent=true
spring.datasource.username=cine
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Activación de Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true