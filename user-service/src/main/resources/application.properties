spring.application.name=user-service
server.port=8080

#Usando localHost
#jdbc:mysql://localhost:3306/cine_users_db?createDatabaseIfNotExist=true&nullCatalogMeansCurrent=true
#Usando docker
#jdbc:mysql://cine-db:3306/cine_users_db?createDatabaseIfNotExist=true&nullCatalogMeansCurrent=true
spring.datasource.url=jdbc:mysql://cine-db:3306/cine_users_db?createDatabaseIfNotExist=true&nullCatalogMeansCurrent=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Activación de Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/doc/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.hateoas.enabled=false
springdoc.cache.disabled=true