networks:
  cine-network:
    driver: bridge

services:
  cine-db:
    image: mysql:8.0
    container_name: cine-db
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - cine-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  eureka-server:
    build: ./eureka-server
    container_name: cine-eureka-server
    ports:
      - "8761:8761"
    networks:
      - cine-network

  api-gateway:
    build: ./api-gateway
    container_name: cine-api-gateway
    ports:
      - "9000:9000"
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    restart: on-failure
    depends_on:
      - eureka-server
    networks:
      - cine-network

  user-service:
    build: ./user-service
    container_name: cine-user-service
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    restart: on-failure
    depends_on:
      - eureka-server
      - cine-db
    networks:
      - cine-network

  cinema-service:
    build: ./cinema-service
    container_name: cine-cinema-service
