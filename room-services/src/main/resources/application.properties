spring.application.name=room-services
server.port=8086
spring.datasource.url=jdbc:mysql://localhost:3306/cine_rooms_db?createDatabaseIfNotExist=true&nullCatalogMeansCurrent=true
spring.datasource.username=cine
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ConfiguraciÃ³n de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ActivaciÃ³n de Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# LOGGING (SLF4J + Logback)

logging.level.root=INFO 

logging.level.cine.proyect.showtimeservice=DEBUG 

# Para ver las consultas SQL en el log:
logging.level.org.hibernate.SQL=DEBUG

# Opción A: Solo el nombre del archivo (se crea en la raíz del proyecto)

logging.file.name=mi-log-showtime.log